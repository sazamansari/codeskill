version: '3.8'

services:
  # Next.js Frontend
  frontend:
    build:
      context: ./frontend-v2
    container_name: codeskill-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5001/api # Update this to your EC2 public IP or domain in production
    restart: unless-stopped
    depends_on:
      - backend

  # NestJS Backend
  backend:
    build:
      context: ./backend-nestjs
    container_name: codeskill-backend
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
      - DATABASE_URI=mongodb://mongo:27017/codeskill # Connects to local mongo container
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=your_super_secret_jwt_key_here
      # AWS S3 Settings
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=your_aws_access_key
      - AWS_SECRET_ACCESS_KEY=your_aws_secret_key
      - AWS_S3_BUCKET_NAME=your-codeskill-s3-bucket-name
      # ADD OTHER ENV VARIABLES FROM YOUR .env HERE
    volumes:
      # CRITICAL: This allows the backend container to talk to the EC2 host's Docker daemon
      - /var/run/docker.sock:/var/run/docker.sock
      # CRITICAL: Bind mount /tmp to /tmp so that when backend tells docker to mount /tmp/cs_xxx, the host has those files!
      - /tmp:/tmp
    restart: unless-stopped
    depends_on:
      - mongo
      - redis

  # Redis for BullMQ Queue
  redis:
    image: redis:7-alpine
    container_name: codeskill-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # MongoDB Database
  mongo:
    image: mongo:6
    container_name: codeskill-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  redis_data:
  mongo_data:
